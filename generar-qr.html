<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generar QR - Asistencias QR</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar" id="sidebar-container"></aside>
        
        <main class="main-content">
            <header style="margin-bottom: 2rem;">
                <h1>Generador de Carnets QR</h1>
                <p style="color: var(--text-muted);">Selecciona un estudiante para generar su código de acceso</p>
            </header>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;">
                <div class="card">
                    <h3>Seleccionar Estudiante</h3>
                    <div class="form-group" style="margin-top: 1rem;">
                        <label>Estudiante</label>
                        <select id="estSelect"></select>
                    </div>
                    <button id="btnGen" class="btn btn-primary" style="width: 100%; justify-content: center;">Generar Código</button>
                </div>

                <div class="card" style="text-align: center;">
                    <h3>Vista Previa del Carnet</h3>
                    <div id="qrPreview" style="margin-top: 1.5rem; padding: 2rem; background: #fff; border: 2px solid var(--secondary); border-radius: 1rem; display: none; position: relative; overflow: hidden;">
                        <div style="position: absolute; top: 0; left: 0; width: 100%; height: 10px; background: var(--primary);"></div>
                        <div style="font-weight: 700; color: var(--secondary); margin-bottom: 1rem; font-size: 1.2rem;">I.E. JUAN DE DIOS COCK</div>
                        <div id="qrImg" style="width: 150px; height: 150px; background: #000; margin: 0 auto; display: flex; align-items: center; justify-content: center; color: white; font-size: 0.8rem;">
                            <!-- QR Simulado -->
                            [CÓDIGO QR]
                        </div>
                        <div id="qrName" style="margin-top: 1rem; font-weight: 600; font-size: 1.1rem;">-</div>
                        <div id="qrId" style="color: var(--text-muted); font-size: 0.9rem;">-</div>
                        <button onclick="imprimirCarnet()" class="btn" style="margin-top: 1.5rem; background: #f1f5f9;">🖨️ Imprimir Carnet</button>
                    </div>
                    <div id="qrPlaceholder" style="padding: 3rem; color: var(--text-muted);">
                        Selecciona un estudiante para visualizar el carnet
                    </div>
                </div>
            </div>
        </main>
    </div>

    <style>
        @media print {
            /* Ocultar todo lo que no sea el carnet */
            body > *:not(.app-container), 
            .sidebar, 
            header, 
            .card:not(:has(#qrPreview)),
            #qrPlaceholder,
            #btnGen,
            .form-group,
            button {
                display: none !important;
            }

            .main-content {
                margin: 0 !important;
                padding: 0 !important;
            }

            .app-container {
                display: block !important;
            }

            #qrPreview {
                display: block !important;
                position: absolute;
                top: 0;
                left: 50%;
                transform: translateX(-50%);
                width: 350px !important;
                border: 2px solid var(--secondary) !important;
                box-shadow: none !important;
                margin: 20px auto !important;
                padding: 20px !important;
                visibility: visible !important;
            }

            #qrPreview * {
                visibility: visible !important;
            }
        }
    </style>

    <script src="js/storage.js"></script>
    <script src="js/auth.js"></script>
    <script>
        Auth.checkSession();

        const select = document.getElementById('estSelect');
        const ests = Storage.getEstudiantes();
        select.innerHTML = ests.map(e => `<option value="${e.id}">${e.nom1} ${e.ape1} (${e.id})</option>`).join('');

        document.getElementById('btnGen').addEventListener('click', () => {
            const id = select.value;
            const est = ests.find(e => e.id === id);
            
            document.getElementById('qrPlaceholder').style.display = 'none';
            document.getElementById('qrPreview').style.display = 'block';
            document.getElementById('qrName').textContent = `${est.nom1} ${est.ape1}`;
            document.getElementById('qrId').textContent = `ID: ${est.id} | Grado: ${est.grado}°`;
            document.getElementById('qrImg').innerHTML = `<img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${id}" alt="QR" style="display:block;">`;
        });

        function imprimirCarnet() {
            window.print();
        }
    </script>
</body>
</html>
