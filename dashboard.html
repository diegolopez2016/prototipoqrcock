<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Asistencias QR</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar" id="sidebar-container"></aside>
        
        <main class="main-content">
            <header style="margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <h1><i class="fas fa-desktop"></i> Panel de Control</h1>
                    <p style="color: var(--text-muted);">Resumen general del sistema</p>
                </div>
                <div id="userInfo" class="badge badge-success"><i class="fas fa-user-circle"></i></div>
            </header>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">Total Estudiantes</div>
                    <div class="stat-value" id="totalEstudiantes">0</div>
                    <div style="font-size: 0.8rem; color: var(--success);">↑ 12% este mes</div>
                </div>
                <div class="stat-card" style="border-left-color: var(--secondary);">
                    <div class="stat-label">Asistencias Hoy</div>
                    <div class="stat-value" id="asistenciasHoy">0</div>
                    <div style="font-size: 0.8rem; color: var(--secondary);">Sincronizado</div>
                </div>
                <div class="stat-card" style="border-left-color: var(--accent);">
                    <div class="stat-label">Sin Código QR</div>
                    <div class="stat-value" id="sinQR">0</div>
                    <div style="font-size: 0.8rem; color: var(--accent);">Pendientes</div>
                </div>
            </div>

            <div class="card">
                <h3>Últimos Registros</h3>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Estudiante</th>
                                <th>Grado</th>
                                <th>Entrada</th>
                                <th>Salida</th>
                                <th>Estado</th>
                            </tr>
                        </thead>
                        <tbody id="recentAttendance">
                            <!-- JS populated -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/auth.js"></script>
    <script>
        const session = Auth.checkSession();
        document.getElementById('userInfo').textContent = `${session.user} (${session.rol})`;

        function updateStats() {
            // Cargar Estadísticas
            const asistencias = Storage.getAsistencias();
            const hoy = new Date().toLocaleDateString();
            const hoyList = asistencias.filter(a => a.fecha === hoy);

            document.getElementById('totalEstudiantes').textContent = Storage.getEstudiantes().length;
            document.getElementById('asistenciasHoy').textContent = hoyList.length;
            document.getElementById('sinQR').textContent = '1'; // Simulado

            // Cargar últimos registros
            const recent = asistencias.slice(0, 5);
            const tbody = document.getElementById('recentAttendance');
            if (recent.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">No hay registros recientes</td></tr>';
            } else {
                tbody.innerHTML = recent.map(a => `
                    <tr>
                        <td><strong>${a.nombre}</strong></td>
                        <td>${a.grado}°</td>
                        <td style="color: var(--success);">${a.hora_entrada || '-'}</td>
                        <td style="color: var(--danger);">${a.hora_salida || '-'}</td>
                        <td>
                            <span class="badge ${a.hora_salida ? 'badge-danger' : 'badge-success'}">
                                ${a.hora_salida ? 'COMPLETO' : 'EN COLEGIO'}
                            </span>
                        </td>
                    </tr>
                `).join('');
            }
        }

        updateStats();
    </script>
</body>
</html>
